<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>اخبار انیمه</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --tg-bg: #ffffff;
    --tg-text: #1a1a1a;
    --tg-hint: #8b8b8b;
    --tg-link: #E85D4A;
    --tg-button: #E85D4A;
    --tg-button-text: #ffffff;
    --tg-secondary-bg: #f4f4f5;

    --accent: #E85D4A;
    --accent-soft: rgba(232, 93, 74, 0.12);
    --anime-color: #6C63FF;
    --manga-color: #D9A441;
    --manhwa-color: #2CA9A3;
    --card-radius: 16px;
    --nav-height: 64px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--tg-bg);
    color: var(--tg-text);
    font-family: 'Vazirmatn', 'Inter', sans-serif;
    height: 100%;
    overscroll-behavior-y: none;
  }

  body.lang-en {
    direction: ltr;
    font-family: 'Inter', 'Vazirmatn', sans-serif;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ---------- Header ---------- */
  header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--tg-secondary-bg);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 800;
    font-size: 17px;
  }
  .brand .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: linear-gradient(135deg, var(--anime-color), var(--accent));
    flex-shrink: 0;
  }

  .lang-toggle {
    display: flex;
    background: var(--tg-secondary-bg);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .lang-toggle button {
    border: none;
    background: transparent;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    color: var(--tg-hint);
    cursor: pointer;
    transition: all .18s ease;
    font-family: inherit;
  }
  .lang-toggle button.active {
    background: var(--accent);
    color: #fff;
  }

  /* ---------- Category chips ---------- */
  .chips {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .chip {
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    background: var(--tg-secondary-bg);
    color: var(--tg-text);
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all .15s ease;
  }
  .chip.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }

  /* ---------- Main scroll area ---------- */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 4px 16px calc(var(--nav-height) + 24px);
    -webkit-overflow-scrolling: touch;
  }

  .search-box {
    position: sticky;
    top: 0;
    background: var(--tg-bg);
    padding: 8px 0 12px;
    z-index: 5;
  }
  .search-box input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--tg-secondary-bg);
    background: var(--tg-secondary-bg);
    font-size: 15px;
    font-family: inherit;
    color: var(--tg-text);
    outline: none;
  }
  .search-box input:focus { border-color: var(--accent); }

  .empty-state {
    text-align: center;
    color: var(--tg-hint);
    padding: 60px 20px;
    font-size: 14px;
    line-height: 2;
  }
  .empty-state .icon { font-size: 36px; display: block; margin-bottom: 8px; }

  /* ---------- News card ---------- */
  .card {
    background: var(--tg-secondary-bg);
    border-radius: var(--card-radius);
    padding: 14px 16px;
    margin-bottom: 12px;
    border-inline-start: 4px solid var(--anime-color);
    animation: fadeIn .25s ease;
    overflow: hidden;
  }
  .card-img {
    width: calc(100% + 32px);
    margin: -14px -16px 12px;
    display: block;
    max-height: 160px;
    object-fit: cover;
  }
  .card[data-cat="manga"] { border-inline-start-color: var(--manga-color); }
  .card[data-cat="manhwa"] { border-inline-start-color: var(--manhwa-color); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity:1; transform: translateY(0);} }

  .card-top {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--anime-color);
    color: #fff;
  }
  .card[data-cat="manga"] .badge { background: var(--manga-color); }
  .card[data-cat="manhwa"] .badge { background: var(--manhwa-color); }

  .card-source { font-size: 11px; color: var(--tg-hint); }

  .card h3 {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 6px;
    line-height: 1.5;
  }
  .card p {
    font-size: 13.5px;
    color: var(--tg-hint);
    line-height: 1.7;
    margin: 0 0 8px;
  }
  .card a.read-more {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--accent);
    text-decoration: none;
  }

  /* ---------- About tab ---------- */
  .about-card {
    background: var(--tg-secondary-bg);
    border-radius: var(--card-radius);
    padding: 20px;
    text-align: center;
    margin-top: 12px;
  }
  .about-logo {
    width: 56px; height: 56px; border-radius: 18px;
    background: linear-gradient(135deg, var(--anime-color), var(--accent));
    margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .about-card h2 { margin: 0 0 8px; font-size: 18px; }
  .about-card p { color: var(--tg-hint); font-size: 14px; line-height: 1.9; margin: 0 0 10px; }
  .creator-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    padding: 6px 14px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 700;
    font-size: 13px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--tg-hint);
    margin: 18px 0 10px;
    text-transform: uppercase;
    letter-spacing: .03em;
  }

  /* ---------- Bottom nav ---------- */
  nav.bottom-nav {
    position: fixed;
    bottom: 0; inset-inline: 0;
    height: var(--nav-height);
    background: var(--tg-bg);
    border-top: 1px solid var(--tg-secondary-bg);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav.bottom-nav button {
    flex: 1;
    border: none;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-family: inherit;
    color: var(--tg-hint);
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
  }
  nav.bottom-nav button .icon { font-size: 20px; }
  nav.bottom-nav button.active { color: var(--accent); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><span class="dot"></span><span id="brandText">اخبار انیمه</span></div>
    <div class="lang-toggle">
      <button id="btnFa" class="active" onclick="setLang('fa')">فارسی</button>
      <button id="btnEn" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <main id="mainArea"></main>

  <nav class="bottom-nav">
    <button id="navHome" class="active" onclick="setTab('home')">
      <span class="icon">🏠</span><span data-i18n="home"></span>
    </button>
    <button id="navHistory" onclick="setTab('history')">
      <span class="icon">🕘</span><span data-i18n="history"></span>
    </button>
    <button id="navSearch" onclick="setTab('search')">
      <span class="icon">🔍</span><span data-i18n="search"></span>
    </button>
    <button id="navAbout" onclick="setTab('about')">
      <span class="icon">ℹ️</span><span data-i18n="about"></span>
    </button>
  </nav>
</div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) {
  tg.ready();
  tg.expand();
  const p = tg.themeParams || {};
  const root = document.documentElement.style;
  if (p.bg_color) root.setProperty('--tg-bg', p.bg_color);
  if (p.text_color) root.setProperty('--tg-text', p.text_color);
  if (p.hint_color) root.setProperty('--tg-hint', p.hint_color);
  if (p.secondary_bg_color) root.setProperty('--tg-secondary-bg', p.secondary_bg_color);
}

const I18N = {
  fa: {
    home: "خانه", history: "تاریخچه", search: "جستجو", about: "درباره",
    brand: "اخبار انیمه", searchPlaceholder: "دنبال چی می‌گردی؟",
    all: "همه", anime: "انیمه", manga: "مانگا", manhwa: "مانهوا",
    emptyHome: "هنوز خبری ثبت نشده", emptySearch: "چیزی پیدا نشد، عبارت دیگه‌ای امتحان کن",
    readMore: "مطالعه‌ی کامل ←", latestNews: "آخرین اخبار",
    aboutTitle: "درباره‌ی این اپ", creator: "سازنده: سوران",
    aboutBody: "این مینی‌اپ هر روز به‌صورت خودکار به سایت‌های خبری معتبر انیمه سر می‌زنه، خبرهای تازه‌ی انیمه، مانگا و مانهوا رو پیدا می‌کنه، به فارسی ترجمه می‌کنه و همین‌جا در اختیارت می‌ذاره. می‌تونی بین دو زبان فارسی و انگلیسی جابه‌جا بشی، توی تاریخچه‌ی کامل بگردی، یا با جستجو دنبال یه خبر خاص بگردی."
  },
  en: {
    home: "Home", history: "History", search: "Search", about: "About",
    brand: "Anime News", searchPlaceholder: "What are you looking for?",
    all: "All", anime: "Anime", manga: "Manga", manhwa: "Manhwa",
    emptyHome: "No news yet", emptySearch: "Nothing found, try another term",
    readMore: "Read more →", latestNews: "Latest news",
    aboutTitle: "About this app", creator: "Made by: Soran",
    aboutBody: "This mini app automatically checks trusted anime news sources every day, finds the latest anime, manga, and manhwa news, translates it, and delivers it right here. Switch between Persian and English, browse the full history, or search for something specific."
  }
};

let lang = 'fa';
let currentTab = 'home';
let currentChip = 'all';
let allNews = [];
let searchQuery = '';

function t(key) { return I18N[lang][key]; }

function setLang(newLang) {
  lang = newLang;
  document.body.classList.toggle('lang-en', lang === 'en');
  document.body.setAttribute('dir', lang === 'en' ? 'ltr' : 'rtl');
  document.getElementById('btnFa').classList.toggle('active', lang === 'fa');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.getElementById('brandText').textContent = t('brand');
  render();
}

function setTab(tab) {
  currentTab = tab;
  ['Home','History','Search','About'].forEach(name => {
    document.getElementById('nav' + name).classList.toggle('active', tab === name.toLowerCase());
  });
  render();
}

function categoryLabel(cat) {
  return { anime: t('anime'), manga: t('manga'), manhwa: t('manhwa') }[cat] || t('anime');
}

function newsCardHTML(item) {
  const title = lang === 'en'
    ? (item.title_en || item.title_fa || item.title || '')
    : (item.title_fa || item.title_en || item.title || '');
  const summary = lang === 'en'
    ? (item.summary_en || item.summary_fa || item.summary || '')
    : (item.summary_fa || item.summary_en || item.summary || '');
  const cat = item.category || 'anime';
  const img = item.image_url
    ? `<img class="card-img" src="${item.image_url}" loading="lazy" onerror="this.remove()">`
    : '';
  return `
    <div class="card" data-cat="${cat}">
      ${img}
      <div class="card-top">
        <span class="badge">${categoryLabel(cat)}</span>
        <span class="card-source">· ${item.source || ''}</span>
      </div>
      <h3>${escapeHtml(title || '')}</h3>
      <p>${escapeHtml((summary || '').slice(0, 220))}${(summary || '').length > 220 ? '…' : ''}</p>
      <a class="read-more" href="${item.link}" target="_blank" rel="noopener">${t('readMore')}</a>
    </div>`;
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function chipsHTML() {
  const cats = ['all', 'anime', 'manga', 'manhwa'];
  return `<div class="chips">${cats.map(c =>
    `<div class="chip ${currentChip === c ? 'active' : ''}" onclick="selectChip('${c}')">${t(c)}</div>`
  ).join('')}</div>`;
}

function selectChip(cat) {
  currentChip = cat;
  render();
}

function filteredNews() {
  let list = allNews;
  if (currentChip !== 'all') list = list.filter(i => i.category === currentChip);
  if (currentTab === 'search' && searchQuery.trim()) {
    const q = searchQuery.trim().toLowerCase();
    list = list.filter(i => {
      const blob = `${i.title_fa} ${i.title_en} ${i.summary_fa} ${i.summary_en}`.toLowerCase();
      return blob.includes(q);
    });
  }
  return list;
}

function render() {
  const main = document.getElementById('mainArea');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });

  if (currentTab === 'about') {
    main.innerHTML = `
      <div class="about-card">
        <div class="about-logo">🎬</div>
        <h2>${t('aboutTitle')}</h2>
        <p>${t('aboutBody')}</p>
        <div class="creator-tag">👤 ${t('creator')}</div>
      </div>`;
    return;
  }

  let list = filteredNews();
  if (currentTab === 'history') {
    // most recent first, no limit
  } else if (currentTab === 'home') {
    list = list.slice(0, 15);
  }

  let html = '';
  if (currentTab === 'search') {
    html += `<div class="search-box"><input id="searchInput" type="text" placeholder="${t('searchPlaceholder')}" value="${escapeHtml(searchQuery)}" oninput="onSearchInput(this.value)"></div>`;
  }
  html += chipsHTML();

  if (list.length === 0) {
    const emptyText = currentTab === 'search' ? t('emptySearch') : t('emptyHome');
    html += `<div class="empty-state"><span class="icon">🍃</span>${emptyText}</div>`;
  } else {
    if (currentTab === 'home') html += `<div class="section-title">${t('latestNews')}</div>`;
    html += list.map(newsCardHTML).join('');
  }

  main.innerHTML = html;

  if (currentTab === 'search') {
    const input = document.getElementById('searchInput');
    if (input) { input.focus(); }
  }
}

function onSearchInput(value) {
  searchQuery = value;
  render();
}

// ⚠️ این آدرس رو با آدرس واقعی PythonAnywhere خودت جایگزین کن
const API_BASE = "https://sisisi.pythonanywhere.com";

async function loadNews() {
  try {
    const res = await fetch(`${API_BASE}/api/history`);
    allNews = await res.json();
  } catch (e) {
    allNews = [];
  }
  render();
}

setLang('fa');
loadNews();
</script>
</body>
</html>
