name: Daily Anime News

on:
  schedule:
    # هر روز ساعت ۰۸:۰۰ به وقت تهران (۰۴:۳۰ UTC)
    - cron: "30 4 * * *"
  workflow_dispatch: {}   # امکان اجرای دستی از تب Actions برای تست

permissions:
  contents: write   # اجازه لازم برای کامیت کردن فایل sent_ids.json

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Commit updated state file
        run: |
          git config user.name "anime-news-bot"
          git config user.email "actions@github.com"
          git add sent_ids.json
          git diff --quiet && git diff --staged --quiet || git commit -m "update sent news log"
          git push
