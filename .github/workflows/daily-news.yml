name: Daily Anime News

on:
  schedule:
    # هر روز ساعت ۰۸:۰۰ به وقت تهران (۰۴:۳۰ UTC)
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # امکان اجرای دستی از تب Actions برای تست

permissions:
  contents: write   # اجازه لازم برای کامیت کردن sent_ids.json و بک‌آپ history.json

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_MOVIE_CHANNEL_ID: ${{ secrets.TELEGRAM_MOVIE_CHANNEL_ID }}
          WEBHOOK_LOG_URL: ${{ secrets.WEBHOOK_LOG_URL }}
          LOG_SECRET: ${{ secrets.LOG_SECRET }}
        run: python bot.py

      - name: Backup history.json from PythonAnywhere
        # اگه فایل history.json روی PythonAnywhere هر دلیلی پاک/خراب بشه،
        # همیشه یه نسخه‌ی پشتیبان تازه توی خودِ ریپو داریم.
        # آدرس پایه رو از همون Secret موجود (WEBHOOK_LOG_URL) می‌سازیم،
        # پس نیازی به Secret جدید نیست.
        env:
          WEBHOOK_LOG_URL: ${{ secrets.WEBHOOK_LOG_URL }}
        run: |
          mkdir -p backups
          BASE_URL="${WEBHOOK_LOG_URL%/log_news}"
          curl -fsSL "${BASE_URL}/api/history?limit=1000" \
            -o backups/history.json \
            || echo "⚠️ نشد از PythonAnywhere بک‌آپ بگیریم (احتمالاً موقتیه، اجرای بعدی دوباره امتحان می‌شه)"

      - name: Commit updated state + backup files
        run: |
          git config user.name "anime-news-bot"
          git config user.email "actions@github.com"
          git add sent_ids.json
          git add backups/history.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "update sent news log + history backup"
          git push
